name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

      - name: Run tests with coverage
        if: matrix.node-version == '20'
        run: npm run test:coverage -- --run

      - name: Upload coverage report
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firestore Emulator
        run: |
          firebase emulators:start --only firestore &
          sleep 10

      - name: Run integration tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: npm run test:integration

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify plugin files exist
        run: |
          test -f .claude-plugin/plugin.json
          test -f .claude-plugin/marketplace.json
          test -f skills/firex/SKILL.md

      - name: Verify plugin versions are in sync with package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKETPLACE=$(node -p "require('./.claude-plugin/marketplace.json').plugins.find(p => p.name === 'firex').version")
          echo "package.json=$PKG plugin.json=$PLUGIN marketplace.json=$MARKETPLACE"
          if [ "$PKG" != "$PLUGIN" ] || [ "$PKG" != "$MARKETPLACE" ]; then
            echo "::error::plugin version out of sync. Run 'npm run sync:plugin-version' and commit." >&2
            exit 1
          fi

      - name: Verify SKILL.md frontmatter
        run: |
          head -1 skills/firex/SKILL.md | grep -q '^---$' || { echo "::error::SKILL.md must start with '---' frontmatter"; exit 1; }
          grep -q '^name: firex$' skills/firex/SKILL.md || { echo "::error::SKILL.md missing name: firex"; exit 1; }
          grep -q '^description:' skills/firex/SKILL.md || { echo "::error::SKILL.md missing description"; exit 1; }

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifest (claude plugin validate)
        run: claude plugin validate .

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js
          test -f dist/index.cjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
